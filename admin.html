<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Minimalis LDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans text-gray-800 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header Sederhana -->
        <header class="bg-white p-6 rounded-xl shadow-sm mb-6 flex justify-between items-center border border-gray-200">
            <h1 class="text-2xl font-bold text-green-700"><i class="fas fa-leaf mr-2"></i> LDU Admin (Mulai Baru)</h1>
            <a href="index.html" class="text-sm text-gray-500 hover:text-green-600"><i class="fas fa-home mr-1"></i> Ke Depan</a>
        </header>

        <!-- Kotak Upload -->
        <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-200">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-upload text-blue-500 mr-2"></i> Tes Upload Gambar</h2>
            <div class="flex flex-col sm:flex-row gap-4 items-center">
                <input type="file" id="media-upload-input" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-md cursor-pointer">
                <button id="btn-upload-media" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-md transition shadow whitespace-nowrap">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Upload File
                </button>
            </div>
        </div>

        <!-- Galeri Gambar -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-images text-green-500 mr-2"></i> Galeri (Folder uploads/)</h2>
            <div id="media-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <div class="col-span-full text-center text-gray-500 py-8">Memuat gambar...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI API HOSTINGER
        // ==========================================
        const HOSTINGER_API = "api.php"; 
        const HOSTINGER_TOKEN = "LduBerkah999!"; 

        // FUNGSI MEMUAT GAMBAR
        async function loadMedia() {
            const grid = document.getElementById('media-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data dari database...</div>';
            
            try {
            const response = await fetch(HOSTINGER_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: HOSTINGER_TOKEN, sql_base64: btoa("SELECT id, url, nama_file, waktu FROM data_media ORDER BY waktu DESC") })
            });
            const result = await response.json();
            if (result.status === 'success') {
                if (result.data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">Belum ada gambar yang diupload.</div>';
                } else {
                    grid.innerHTML = '';
                    result.data.forEach(row => {
                        grid.innerHTML += `
                            <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm bg-gray-50 flex flex-col">
                                <div class="h-32 bg-gray-200 flex items-center justify-center overflow-hidden">
                                    <img src="${row[1]}" alt="${row[2]}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-2 mt-auto">
                                    <p class="text-xs text-gray-500 truncate mb-2" title="${row[2]}">${row[2]}</p>
                                    <button onclick="navigator.clipboard.writeText('${row[1]}'); alert('Link Tersalin!')" class="w-full bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 text-xs py-1.5 rounded transition font-medium">
                                        <i class="far fa-copy mr-1"></i> Copy URL
                                    </button>
                                </div>
                            </div>`;
                    });
                }
            } else {
                grid.innerHTML = `<div class="col-span-full text-center text-red-500 py-8">Gagal memuat: ${result.message}</div>`;
            }
        } catch (error) {
            grid.innerHTML = `<div class="col-span-full text-center text-red-500 py-8">Error Koneksi: ${error.message}</div>`;
        }
    }

    // FUNGSI UPLOAD GAMBAR
    document.getElementById('btn-upload-media').addEventListener('click', async function() {
        const fileInput = document.getElementById('media-upload-input');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Pilih file gambar dulu ya, Bos!");
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            alert("Ukuran gambar terlalu besar! Maksimal 10MB.");
            return;
        }
        
        const btn = this;
        const originalText = btn.innerHTML;
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Proses Upload...';
        
        const formData = new FormData();
        formData.append('token', HOSTINGER_TOKEN);
        formData.append('action', 'upload_media');
        formData.append('file', file);
        
        try {
            const response = await fetch(HOSTINGER_API, { method: 'POST', body: formData });
            const responseText = await response.text();
            let result;
            try {
                result = JSON.parse(responseText);
            } catch (parseError) {
                throw new Error("Respon server bukan JSON. Detail: " + responseText.substring(0, 100));
            }
            
            if (result.status === 'success') { 
                alert("Alhamdulillah! Gambar berhasil diupload.");
                fileInput.value = ""; // Reset input
                loadMedia(); // Muat ulang galeri
            } else { 
                alert("Gagal upload: " + result.message); 
            }
        } catch (error) { 
            alert("Error upload: " + error.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = originalText; 
        }
    });

    // Panggil galeri saat halaman pertama kali dibuka
    loadMedia();
    </script>
</body>
</html>
