<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Minimalis LDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-green-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-green-800">
            <div class="flex items-center gap-2">
                <i class="fas fa-leaf text-xl text-yellow-400"></i>
                <span class="font-bold text-xl tracking-wide">LDU Admin</span>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" id="nav-dashboard" onclick="switchTab('dashboard')" class="flex items-center gap-3 px-4 py-3 rounded-lg text-green-300 hover:bg-green-800 hover:text-white transition cursor-pointer">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </a>
            <a href="#" id="nav-program" onclick="switchTab('program')" class="flex items-center gap-3 px-4 py-3 rounded-lg text-green-300 hover:bg-green-800 hover:text-white transition cursor-pointer">
                <i class="fas fa-bullhorn w-5"></i> Program
            </a>
            <a href="#" id="nav-media" onclick="switchTab('media')" class="flex items-center gap-3 bg-green-800 px-4 py-3 rounded-lg text-white font-medium cursor-pointer">
                <i class="fas fa-images w-5"></i> Media / Gambar
            </a>
        </nav>
        <div class="p-4 border-t border-green-800">
            <a href="index.html" class="flex items-center gap-3 px-4 py-2 text-green-300 hover:text-white transition">
                <i class="fas fa-sign-out-alt w-5"></i> Keluar
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10 border-b border-gray-200">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-500 hover:text-green-600 focus:outline-none">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 id="header-title" class="text-xl font-bold text-gray-800">Media & Gambar</h2>
            </div>
            <div class="flex items-center gap-2 border-l pl-4 border-gray-200">
                <img src="https://ui-avatars.com/api/?name=Admin+Bos&background=0D8ABC&color=fff" alt="Admin" class="w-8 h-8 rounded-full">
                <span class="font-medium text-sm hidden sm:block">Admin Bos</span>
            </div>
        </header>

        <div class="flex-1 overflow-x-hidden overflow-y-auto p-6 bg-gray-50">
            
            <!-- Dashboard Placeholder -->
            <div id="section-dashboard" class="hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Dashboard</h2>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-gray-500 text-center py-12">
                    <i class="fas fa-tools text-4xl mb-3 opacity-50"></i>
                    <p>Menu ini akan segera kita bangun.</p>
                </div>
            </div>

            <!-- Program Placeholder -->
            <div id="section-program" class="hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Program Donasi</h2>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-gray-500 text-center py-12">
                    <i class="fas fa-bullhorn text-4xl mb-3 opacity-50"></i>
                    <p>Formulir Input Program akan diletakkan di sini.</p>
                </div>
            </div>

            <!-- Media Section (Aktif) -->
            <div id="section-media" class="block">
                <!-- Kotak Upload -->
                <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-upload text-blue-500 mr-2"></i> Tes Upload Gambar</h2>
                    <div class="flex flex-col sm:flex-row gap-4 items-center">
                        <input type="file" id="media-upload-input" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-md cursor-pointer">
                        <button id="btn-upload-media" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-md transition shadow whitespace-nowrap">
                            <i class="fas fa-cloud-upload-alt mr-2"></i> Upload File
                        </button>
                    </div>
                </div>

                <!-- Galeri Gambar -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-images text-green-500 mr-2"></i> Galeri (Folder uploads/)</h2>
                    <div id="media-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        <div class="col-span-full text-center text-gray-500 py-8">Memuat gambar...</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // ==========================================
        // KONFIGURASI API HOSTINGER
        // ==========================================
        const HOSTINGER_API = "api.php"; 
        const HOSTINGER_TOKEN = "LduBerkah999!"; 

        // FUNGSI MEMUAT GAMBAR
        async function loadMedia() {
            const grid = document.getElementById('media-grid');
            grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8"><i class="fas fa-spinner fa-spin mr-2"></i> Mengambil data dari database...</div>';
            
            try {
            const response = await fetch(HOSTINGER_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: HOSTINGER_TOKEN, sql_base64: btoa("SELECT id, url, nama_file, waktu FROM data_media ORDER BY waktu DESC") })
            });
            const result = await response.json();
            if (result.status === 'success') {
                if (result.data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">Belum ada gambar yang diupload.</div>';
                } else {
                    grid.innerHTML = '';
                    result.data.forEach(row => {
                        grid.innerHTML += `
                            <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm bg-gray-50 flex flex-col">
                                <div class="h-32 bg-gray-200 flex items-center justify-center overflow-hidden">
                                    <img src="${row[1]}" alt="${row[2]}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-2 mt-auto">
                                    <p class="text-xs text-gray-500 truncate mb-2" title="${row[2]}">${row[2]}</p>
                                    <button onclick="navigator.clipboard.writeText('${row[1]}'); alert('Link Tersalin!')" class="w-full bg-white border border-gray-300 hover:bg-gray-100 text-gray-700 text-xs py-1.5 rounded transition font-medium">
                                        <i class="far fa-copy mr-1"></i> Copy URL
                                    </button>
                                </div>
                            </div>`;
                    });
                }
            } else {
                grid.innerHTML = `<div class="col-span-full text-center text-red-500 py-8">Gagal memuat: ${result.message}</div>`;
            }
        } catch (error) {
            grid.innerHTML = `<div class="col-span-full text-center text-red-500 py-8">Error Koneksi: ${error.message}</div>`;
        }
    }

    // FUNGSI UPLOAD GAMBAR
    document.getElementById('btn-upload-media').addEventListener('click', async function() {
        const fileInput = document.getElementById('media-upload-input');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Pilih file gambar dulu ya, Bos!");
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            alert("Ukuran gambar terlalu besar! Maksimal 10MB.");
            return;
        }
        
        const btn = this;
        const originalText = btn.innerHTML;
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Proses Upload...';
        
        const formData = new FormData();
        formData.append('token', HOSTINGER_TOKEN);
        formData.append('action', 'upload_media');
        formData.append('file', file);
        
        try {
            const response = await fetch(HOSTINGER_API, { method: 'POST', body: formData });
            const responseText = await response.text();
            let result;
            try {
                result = JSON.parse(responseText);
            } catch (parseError) {
                throw new Error("Respon server bukan JSON. Detail: " + responseText.substring(0, 100));
            }
            
            if (result.status === 'success') { 
                alert("Alhamdulillah! Gambar berhasil diupload.");
                fileInput.value = ""; // Reset input
                loadMedia(); // Muat ulang galeri
            } else { 
                alert("Gagal upload: " + result.message); 
            }
        } catch (error) { 
            alert("Error upload: " + error.message); 
        } finally { 
            btn.disabled = false; 
            btn.innerHTML = originalText; 
        }
    });

    // FUNGSI SWITCH TAB (Navigasi Sidebar)
    function switchTab(tabName) {
        // Sembunyikan semua section
        document.getElementById('section-dashboard').classList.add('hidden');
        document.getElementById('section-program').classList.add('hidden');
        document.getElementById('section-media').classList.add('hidden');
        
        // Reset style semua nav
        const navClasses = "flex items-center gap-3 px-4 py-3 rounded-lg text-green-300 hover:bg-green-800 hover:text-white transition cursor-pointer";
        const activeClasses = "flex items-center gap-3 bg-green-800 px-4 py-3 rounded-lg text-white font-medium cursor-pointer";
        
        document.getElementById('nav-dashboard').className = navClasses;
        document.getElementById('nav-program').className = navClasses;
        document.getElementById('nav-media').className = navClasses;
        
        // Munculkan section yang dipilih dan beri warna aktif pada nav-nya
        document.getElementById('section-' + tabName).classList.remove('hidden');
        document.getElementById('nav-' + tabName).className = activeClasses;

        // Ubah Judul Header
        const headerTitle = document.getElementById('header-title');
        if (tabName === 'dashboard') headerTitle.innerText = "Overview";
        if (tabName === 'program') headerTitle.innerText = "Program";
        if (tabName === 'media') { headerTitle.innerText = "Media & Gambar"; loadMedia(); }
    }

    // Panggil galeri saat halaman pertama kali dibuka
    loadMedia();
    </script>
</body>
</html>
