<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Donasi - Lumbung Dana Umat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-md fixed w-full z-50 top-0 left-0">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2">
                        <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold text-xl">
                            <i class="fas fa-leaf"></i>
                        </div>
                        <span class="font-bold text-2xl text-green-700">Lumbung Dana Umat</span>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="index.html#program" class="text-gray-600 hover:text-green-600 font-medium">Program</a>
                    <a href="index.html" class="text-gray-600 hover:text-green-600 font-medium">Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="bg-green-600 p-6 text-center text-white">
                    <h1 class="text-2xl font-bold mb-2">Formulir Donasi</h1>
                    <p class="text-green-100" id="program-title-display">Lengkapi data di bawah ini untuk berdonasi</p>
                </div>
                
                <form id="form-donasi" class="p-6 md:p-8 space-y-6">
                    <input type="hidden" id="donasi-program-id" value="">
                    
                    <!-- Nominal -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-3">Pilih Nominal Donasi</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                            <button type="button" class="nom-btn border border-gray-300 rounded-lg py-2 px-4 hover:border-green-500 hover:bg-green-50 focus:outline-none transition font-medium" data-val="50000">Rp 50.000</button>
                            <button type="button" class="nom-btn border border-gray-300 rounded-lg py-2 px-4 hover:border-green-500 hover:bg-green-50 focus:outline-none transition font-medium" data-val="100000">Rp 100.000</button>
                            <button type="button" class="nom-btn border border-gray-300 rounded-lg py-2 px-4 hover:border-green-500 hover:bg-green-50 focus:outline-none transition font-medium" data-val="300000">Rp 300.000</button>
                            <button type="button" class="nom-btn border border-gray-300 rounded-lg py-2 px-4 hover:border-green-500 hover:bg-green-50 focus:outline-none transition font-medium" data-val="500000">Rp 500.000</button>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="text-gray-500 sm:text-sm font-medium">Rp</span>
                            </div>
                            <input type="number" id="donasi-nominal" required min="10000" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 font-medium" placeholder="Nominal lainnya (Min. 10.000)">
                        </div>
                    </div>

                    <!-- Data Diri -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-3">Data Diri</label>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Nama Lengkap</label>
                                <div class="flex">
                                    <select id="donasi-sapaan" class="px-3 py-3 border border-gray-300 border-r-0 rounded-l-lg bg-gray-50 focus:ring-green-500 focus:border-green-500 focus:z-10 text-sm text-gray-700 outline-none">
                                        <option value="Bapak">Bapak</option>
                                        <option value="Ibu">Ibu</option>
                                        <option value="Mas">Mas</option>
                                        <option value="Mbak">Mbak</option>
                                    </select>
                                    <input type="text" id="donasi-nama" required class="block w-full flex-1 px-4 py-3 border border-gray-300 rounded-r-lg focus:ring-green-500 focus:border-green-500 focus:z-10 outline-none" placeholder="Nama Anda (Bisa disamarkan jika hamba Allah)">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Nomor WhatsApp</label>
                                <input type="tel" id="donasi-wa" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="0812xxxxxx">
                            </div>
                        </div>
                    </div>

                    <!-- Metode Pembayaran -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-3">Metode Pembayaran</label>
                        <select id="donasi-metode" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 bg-white">
                            <option value="">-- Pilih Metode --</option>
                            <option value="BSI">Transfer BSI</option>
                            <option value="BCA">Transfer BCA</option>
                            <option value="MANDIRI">Transfer Mandiri</option>
                            <option value="GOPAY">E-Wallet GoPay</option>
                            <option value="OVO">E-Wallet OVO</option>
                            <option value="DANA">E-Wallet DANA</option>
                            <option value="QRIS">Scan QRIS</option>
                        </select>
                    </div>

                    <!-- Doa -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-3">Titipan Doa / Harapan (Opsional)</label>
                        <textarea id="donasi-doa" rows="3" class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="Tuliskan doa Anda agar diaminkan oleh ribuan penerima manfaat..."></textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="w-full bg-yellow-500 text-green-900 font-extrabold py-4 rounded-lg hover:bg-yellow-400 transition shadow-lg flex items-center justify-center gap-2 text-lg">
                        Lanjut Pembayaran <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Cek URL params untuk melihat apakah ada program_id spesifik
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const programId = urlParams.get('program');
            if(programId) {
                document.getElementById('donasi-program-id').value = programId;
                document.getElementById('program-title-display').innerText = "Donasi untuk Program Terpilih";
            }
        });

        // Script untuk UI tombol nominal cepat
        const nomBtns = document.querySelectorAll('.nom-btn');
        const inputNominal = document.getElementById('donasi-nominal');

        nomBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Reset styling semua tombol nominal
                nomBtns.forEach(b => {
                    b.classList.remove('bg-green-100', 'border-green-500', 'text-green-800');
                    b.classList.add('border-gray-300');
                });
                
                // Add active styling pada yang diklik
                this.classList.remove('border-gray-300');
                this.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
                
                // Set value ke input number
                inputNominal.value = this.getAttribute('data-val');
            });
        });

        // Event Listener Submit
        document.getElementById('form-donasi').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Memproses... <i class="fas fa-spinner fa-spin"></i>';

            const payload = {
                type: 'tambah_donatur',
                program_id: document.getElementById('donasi-program-id').value || null,
                nominal: document.getElementById('donasi-nominal').value,
                nama: document.getElementById('donasi-sapaan').value + ' ' + document.getElementById('donasi-nama').value,
                whatsapp: document.getElementById('donasi-wa').value,
                metode_pembayaran: document.getElementById('donasi-metode').value,
                doa: document.getElementById('donasi-doa').value
            };

            try {
                const endpoint = "https://script.google.com/macros/s/AKfycbztcWAAM2eWTSUIJ8jM2m-o72_sA8NXyG7Ck_QxYTin8sBbwf0ab6EzEMNEXe087NY/exec";
                const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                
                const responseText = await response.text(); 
                let result = JSON.parse(responseText);

                if (result.status === "success") {
                    alert("Alhamdulillah! Form donasi berhasil disubmit. Kami akan segera menghubungi WA Anda untuk konfirmasi.");
                    this.reset();
                } else {
                    alert("Gagal mensubmit donasi: " + (result.message || "Unknown error"));
                }
            } catch (error) {
                alert("Terjadi kesalahan jaringan.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
