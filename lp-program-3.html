<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisah Inspiratif - Lumbung Dana Umat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fcfcfc] text-[#2c3e50] font-serif pb-16">
    <nav class="bg-transparent p-6 text-center border-b border-gray-200">
        <a href="index.html" class="font-bold text-2xl tracking-widest text-[#2980b9]">LDU STORIES</a>
    </nav>

    <main class="max-w-3xl mx-auto px-5 mt-10">
        <h1 id="prog-judul" class="text-4xl md:text-5xl font-medium mb-8 text-center leading-snug text-[#1a252f]">Memuat Kisah...</h1>
        
        <!-- Carousel di atas sebelum cerita -->
        <div class="overflow-hidden w-full mb-10 shadow-lg">
            <div id="carousel-track" class="flex transition-transform duration-[1000ms] ease-out" style="width: 166.666%;">
                <div class="w-1/5"><img class="c-img w-full h-64 md:h-80 object-cover" src=""></div>
                <div class="w-1/5"><img class="c-img w-full h-64 md:h-80 object-cover" src=""></div>
                <div class="w-1/5"><img class="c-img w-full h-64 md:h-80 object-cover" src=""></div>
                <div class="w-1/5"><img class="c-img w-full h-64 md:h-80 object-cover" src=""></div>
                <div class="w-1/5"><img class="c-img w-full h-64 md:h-80 object-cover" src=""></div>
            </div>
        </div>

        <!-- Progress Santai -->
        <div class="flex justify-between font-sans text-sm text-gray-500 mb-2 uppercase tracking-wide"><span>Terkumpul: Rp 0</span><span id="prog-target">Target: Rp 0</span></div>
        <div class="w-full bg-gray-200 h-1 mb-12"><div class="bg-[#2980b9] h-1" style="width: 5%"></div></div>

        <article id="prog-artikel" class="text-lg md:text-xl leading-loose mb-16 text-justify font-serif text-gray-700">
            Menunggu cerita inspiratif...
        </article>

        <!-- Formulir Elegan -->
        <div id="form-section" class="bg-white p-8 md:p-12 shadow-2xl border border-gray-100 font-sans">
            <h2 class="text-2xl font-bold text-center text-[#2980b9] mb-8">Ambil Bagian dalam Kebaikan Ini</h2>
            <form id="form-donasi" class="space-y-5 max-w-lg mx-auto">
                <input type="hidden" id="donasi-program-id" value="">
                <div class="grid grid-cols-3 gap-3">
                    <button type="button" class="nom-btn border border-gray-300 py-3 text-sm hover:border-[#2980b9] hover:text-[#2980b9] transition" data-val="50000">50 Ribu</button>
                    <button type="button" class="nom-btn border border-gray-300 py-3 text-sm hover:border-[#2980b9] hover:text-[#2980b9] transition" data-val="100000">100 Ribu</button>
                    <button type="button" class="nom-btn border border-gray-300 py-3 text-sm hover:border-[#2980b9] hover:text-[#2980b9] transition" data-val="500000">500 Ribu</button>
                </div>
                <input type="number" id="donasi-nominal" required min="10000" class="w-full px-0 py-3 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none" placeholder="Isi nominal lain">
                
                <div class="flex gap-2">
                    <select id="donasi-sapaan" class="w-24 px-0 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none bg-transparent"><option>Bapak</option><option>Ibu</option></select>
                    <input type="text" id="donasi-nama" required class="flex-1 px-0 py-3 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none" placeholder="Nama Lengkap">
                </div>
                <input type="tel" id="donasi-wa" required class="w-full px-0 py-3 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none" placeholder="Nomor WhatsApp">
                <select id="donasi-metode" required class="w-full px-0 py-3 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none bg-transparent text-gray-500"><option value="">Pilih Metode Pembayaran</option><option>Transfer Bank BSI</option><option>Transfer Bank Mandiri</option><option>E-Wallet Dana</option><option>E-Wallet GoPay</option><option>QRIS</option></select>
                <textarea id="donasi-doa" rows="1" class="w-full px-0 py-3 border-b-2 border-gray-300 focus:border-[#2980b9] outline-none mt-4" placeholder="Doa terbaik Anda..."></textarea>
                
                <div class="pt-6">
                    <button type="submit" class="w-full bg-[#2980b9] text-white font-bold py-4 hover:bg-[#1a252f] transition tracking-widest uppercase">Sedekah Sekarang</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Fetch & Carousel Sama persis
        document.addEventListener("DOMContentLoaded", async function() {
            const progId = new URLSearchParams(window.location.search).get('id');
            try {
                const res = await fetch("https://script.google.com/macros/s/AKfycbztcWAAM2eWTSUIJ8jM2m-o72_sA8NXyG7Ck_QxYTin8sBbwf0ab6EzEMNEXe087NY/exec"); 
                const result = await res.json();
                const prog = result.data.programs.find(p => p.id == progId) || result.data.programs[0];
                if(prog) {
                    document.getElementById('prog-judul').innerText = prog.judul;
                    document.getElementById('prog-target').innerText = "Target: Rp " + Number(prog.target_dana).toLocaleString('id-ID');
                    document.getElementById('prog-artikel').innerHTML = prog.artikel.replace(/\n/g, '<br><br>');
                    document.querySelectorAll('.c-img').forEach(img => img.src = prog.url_gambar);
                    document.getElementById('donasi-program-id').value = prog.id;
                }
            } catch(e) {}
        });

        const track = document.getElementById('carousel-track'); let cIndex = 0;
        setInterval(() => { cIndex++; if(cIndex > 2) cIndex = 0; track.style.transform = `translateX(-${cIndex * 20}%)`; }, 3500); // Agak pelan

        // Form UI
        const nomBtns = document.querySelectorAll('.nom-btn');
        const inputNominal = document.getElementById('donasi-nominal');
        nomBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                nomBtns.forEach(b => { b.classList.remove('border-[#2980b9]', 'text-[#2980b9]'); b.classList.add('border-gray-300'); });
                this.classList.add('border-[#2980b9]', 'text-[#2980b9]'); this.classList.remove('border-gray-300');
                inputNominal.value = this.getAttribute('data-val');
            });
        });

        document.getElementById('form-donasi').addEventListener('submit', async function(e) {
            e.preventDefault(); const btn = this.querySelector('button[type="submit"]'); const ori = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = 'Memproses...';
            const payload = { type: 'tambah_donatur', program_id: document.getElementById('donasi-program-id').value, nominal: inputNominal.value, nama: document.getElementById('donasi-sapaan').value + ' ' + document.getElementById('donasi-nama').value, whatsapp: document.getElementById('donasi-wa').value, metode_pembayaran: document.getElementById('donasi-metode').value, doa: document.getElementById('donasi-doa').value };
            try {
                const res = await fetch("https://script.google.com/macros/s/AKfycbztcWAAM2eWTSUIJ8jM2m-o72_sA8NXyG7Ck_QxYTin8sBbwf0ab6EzEMNEXe087NY/exec", { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === "success") { alert("Semoga Allah memberikan keberkahan untuk sedekah ini."); this.reset(); }
            } catch(e) {}
            btn.disabled = false; btn.innerHTML = ori;
        });
    </script>
</body>
</html>
